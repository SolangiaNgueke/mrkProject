<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mes parcelles</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f3f4f6; color: #1f2937; }
    header { background: #1f2d3a; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 18px; margin: 0; }
    header a { color: #93c5fd; text-decoration: none; font-size: 14px; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 5px rgba(0,0,0,.07); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 14px; text-align: left; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
    th { color: #6b7280; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
    .ref { font-weight: 600; }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 12px; color: #fff; }
    .doc-link { color: #2563eb; text-decoration: none; font-size: 13px; font-weight: 600; }
    .msg { padding: 40px; text-align: center; color: #6b7280; }
    .msg.err { color: #b91c1c; }
  </style>
</head>
<body>
  <header>
    <h1>Mes parcelles</h1>
    <a href="index.html">← Carte publique</a>
  </header>

  <div class="wrap">
    <div class="card">
      <div id="msg" class="msg">Chargement…</div>
      <table id="tbl" style="display:none">
        <thead>
          <tr><th>Référence</th><th>Statut</th><th>Fiabilité</th><th>Dimension</th><th>Déclarée le</th><th>Documents</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000/api/";
    const token = localStorage.getItem("foncier_token");

    const STATUT_COLORS = {
      draft: "#9ca3af", submitted: "#f59e0b", verifying: "#3b82f6",
      validated: "#22c55e", rejected: "#6b7280", disputed: "#ef4444"
    };

    function setMsg(t, err) {
      const m = document.getElementById("msg");
      m.textContent = t; m.className = "msg" + (err ? " err" : ""); m.style.display = "block";
    }

    function fmtDate(iso) {
      try { return new Date(iso).toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" }); }
      catch (e) { return iso; }
    }
    function fmtSurface(m2) {
      if (!m2) return "—";
      return `${Math.round(m2)} m² (${(m2/10000).toFixed(2)} ha)`;
    }

    async function load() {
      if (!token) { setMsg("Connecte-toi sur la carte pour voir tes parcelles.", true); return; }
      let res;
      try { res = await fetch(API + "parcelles/mine/", { headers: { "Authorization": "Token " + token } }); }
      catch (e) { setMsg("Erreur réseau : " + e, true); return; }
      if (res.status === 401) { setMsg("Session expirée. Reconnecte-toi sur la carte.", true); return; }
      if (!res.ok) { setMsg("Impossible de charger tes parcelles.", true); return; }
      const list = await res.json();
      if (!list.length) { setMsg("Tu n'as encore déclaré aucune parcelle.", false); return; }

      document.getElementById("rows").innerHTML = list.map(p => {
        const color = STATUT_COLORS[p.status] || "#999";
        return `<tr>
          <td class="ref">${p.reference || ("#" + p.id)}</td>
          <td><span class="badge" style="background:${color}">${p.status_display}</span></td>
          <td>${p.reliability_display}</td>
          <td>${fmtSurface(p.surface_m2)}</td>
          <td>${fmtDate(p.created_at)}</td>
          <td><a class="doc-link" href="documents.html?parcelle=${p.id}">Gérer les documents →</a></td>
        </tr>`;
      }).join("");

      document.getElementById("msg").style.display = "none";
      document.getElementById("tbl").style.display = "table";
    }

    load();
  </script>
</body>
</html>
