services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: foncier
      POSTGRES_USER: foncier
      POSTGRES_PASSWORD: foncier
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foncier"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "1"
      SECRET_KEY: "dev-secret-change-me"
      POSTGRES_DB: foncier
      POSTGRES_USER: foncier
      POSTGRES_PASSWORD: foncier
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: